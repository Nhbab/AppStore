<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background: #70c5ce;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game variables
let birdY = 300;
let birdX = 50;
let birdVelocity = 0;
const gravity = 0.4;
const jumpStrength = -7;
const birdSize = 20;

let pipes = [];
const pipeWidth = 60;
const pipeGap = 150;
const pipeSpeed = 2.5;
let frameCount = 0;
let score = 0;
let highScore = localStorage.getItem("flappyHighScore") || 0;
let gameState = "START"; // START, PLAYING, GAMEOVER

// Controls
function handleJump() {
    if (gameState === "START") {
        gameState = "PLAYING";
        resetGame();
    } else if (gameState === "PLAYING") {
        birdVelocity = jumpStrength;
    } else if (gameState === "GAMEOVER") {
        gameState = "PLAYING";
        resetGame();
    }
}

document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
        handleJump();
        e.preventDefault();
    }
});

canvas.addEventListener("touchstart", (e) => {
    handleJump();
    e.preventDefault();
});

canvas.addEventListener("mousedown", () => {
    handleJump();
});

function resetGame() {
    birdY = 300;
    birdVelocity = 0;
    pipes = [];
    score = 0;
    frameCount = 0;
}

function createPipe() {
    // Random gap position
    const minHeight = 50;
    const maxHeight = canvas.height - pipeGap - minHeight;
    const topPipeHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
    
    pipes.push({
        x: canvas.width,
        top: topPipeHeight,
        bottom: canvas.height - topPipeHeight - pipeGap,
        passed: false
    });
}

function update() {
    if (gameState === "PLAYING") {
        birdVelocity += gravity;
        birdY += birdVelocity;

        // Ground and ceiling collision
        if (birdY + birdSize > canvas.height || birdY - birdSize < 0) {
            endGame();
        }

        // Handle pipes
        if (frameCount % 100 === 0) {
            createPipe();
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;

            // Collision check
            if (
                birdX + birdSize > pipes[i].x && 
                birdX - birdSize < pipes[i].x + pipeWidth &&
                (birdY - birdSize < pipes[i].top || birdY + birdSize > canvas.height - pipes[i].bottom)
            ) {
                endGame();
            }

            // Score point
            if (!pipes[i].passed && pipes[i].x + pipeWidth < birdX) {
                score++;
                pipes[i].passed = true;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("flappyHighScore", highScore);
                }
            }

            // Remove offscreen pipes
            if (pipes[i].x + pipeWidth < 0) {
                pipes.splice(i, 1);
            }
        }

        frameCount++;
    }
}

function endGame() {
    gameState = "GAMEOVER";
}

function draw() {
    // Clear background
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw background clouds details (static vector blocks)
    ctx.fillStyle = "#ced6e0";
    ctx.fillRect(0, canvas.height - 40, canvas.width, 40); // Ground

    // Draw pipes
    ctx.fillStyle = "#78c850";
    for (let pipe of pipes) {
        // Top pipe
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
        ctx.strokeStyle = "#538038";
        ctx.lineWidth = 3;
        ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);

        // Bottom pipe
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
        ctx.strokeRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
    }

    // Draw bird
    ctx.fillStyle = "#f1c40f";
    ctx.beginPath();
    ctx.arc(birdX, birdY, birdSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#d68910";
    ctx.stroke();
    
    // Bird eye
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(birdX + 8, birdY - 4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(birdX + 10, birdY - 4, 2, 0, Math.PI * 2);
    ctx.fill();

    // Bird beak
    ctx.fillStyle = "#e67e22";
    ctx.beginPath();
    ctx.moveTo(birdX + birdSize - 2, birdY - 2);
    ctx.lineTo(birdX + birdSize + 10, birdY + 2);
    ctx.lineTo(birdX + birdSize - 2, birdY + 6);
    ctx.fill();

    // Draw UI Text
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "center";

    if (gameState === "START") {
        ctx.fillText("FLAPPY BIRD", canvas.width / 2, canvas.height / 2 - 50);
        ctx.strokeText("FLAPPY BIRD", canvas.width / 2, canvas.height / 2 - 50);
        
        ctx.font = "20px Arial";
        ctx.fillText("Press Space or Click to Start", canvas.width / 2, canvas.height / 2 + 10);
        ctx.strokeText("Press Space or Click to Start", canvas.width / 2, canvas.height / 2 + 10);
    }

    if (gameState === "PLAYING") {
        ctx.font = "bold 40px Arial";
        ctx.fillText(score, canvas.width / 2, 80);
        ctx.strokeText(score, canvas.width / 2, 80);
    }

    if (gameState === "GAMEOVER") {
        ctx.font = "bold 36px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 60);
        ctx.strokeText("GAME OVER", canvas.width / 2, canvas.height / 2 - 60);

        ctx.font = "24px Arial";
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 - 10);
        ctx.strokeText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 - 10);

        ctx.fillText(`Best: ${highScore}`, canvas.width / 2, canvas.height / 2 + 25);
        ctx.strokeText(`Best: ${highScore}`, canvas.width / 2, canvas.height / 2 + 25);

        ctx.font = "18px Arial";
        ctx.fillText("Press Space or Click to Restart", canvas.width / 2, canvas.height / 2 + 80);
        ctx.strokeText("Press Space or Click to Restart", canvas.width / 2, canvas.height / 2 + 80);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Fire up the engine
gameLoop();
</script>

</body>
</html>
